<!DOCTYPE html>
<html>

<head>
<title>AI Home Gardening Assistant</title>
<link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>

<body>

<div class="container">

<h1>🌱 AI Home Gardening Assistant</h1>

<form method="POST">

<label>Select Plant</label><br><br>

<select name="plant">
<option value="Tomato">Tomato</option>
<option value="Mint">Mint</option>
<option value="Chili">Chili</option>
<option value="Coriander">Coriander</option>
<option value="Spinach">Spinach</option>
</select>

<input type="hidden" name="index" value="0">

<br><br>

<button type="submit">Next Tip ➡</button>

</form>


{% if tip %}

<div class="result">

<h3>🌿 Tip</h3>

<p>{{ tip }}</p>

<div style="display:flex; justify-content:center; gap:20px;">

<!-- Previous Tip -->
<form method="POST">
<input type="hidden" name="plant" value="{{ plant }}">
<input type="hidden" name="index" value="{{ index-2 }}">
<button type="submit">⬅ Previous</button>
</form>

<!-- Next Tip -->
<form method="POST">
<input type="hidden" name="plant" value="{{ plant }}">
<input type="hidden" name="index" value="{{ index }}">
<button type="submit">Next ➡</button>
</form>

</div>

</div>

{% endif %}


{% if end %}

<h3>✅ You have viewed all the basic gardening tips for this plant.</h3>

<p>For more information visit:</p>
<a href="{{ wiki }}" target="_blank">📚 Learn More on Wikipedia</a>

{% endif %}

</div>

</body>
</html>
